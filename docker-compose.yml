services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-final-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_final
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_final"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
